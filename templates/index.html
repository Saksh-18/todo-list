<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Todo List</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f9f9f7; color: #1a1a1a; }
    .container { max-width: 560px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
    .date { color: #888; font-size: 13px; margin-bottom: 20px; }
    .input-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .input-row input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
    .input-row input:focus { border-color: #888; }
    .input-row button { padding: 10px 20px; background: #1a1a1a; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; }
    .input-row button:hover { background: #333; }
    .filters { display: flex; gap: 8px; margin-bottom: 12px; }
    .filters a { padding: 5px 16px; border: 1px solid #ddd; border-radius: 20px; font-size: 13px; text-decoration: none; color: #666; }
    .filters a.active { background: #1a1a1a; color: white; border-color: #1a1a1a; }
    hr { border: none; border-top: 1px solid #eee; margin-bottom: 16px; }
    .task-list { display: flex; flex-direction: column; gap: 8px; }
    .task-card { display: flex; align-items: center; gap: 12px; background: white; border: 1px solid #eee; border-radius: 10px; padding: 12px 14px; }
    .check-btn { width: 26px; height: 26px; border-radius: 50%; border: 2px solid #ccc; background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 13px; color: transparent; flex-shrink: 0; }
    .check-btn.checked { background: #4caf50; border-color: #4caf50; color: white; }
    .task-text { flex: 1; font-size: 14px; }
    .task-text.done { text-decoration: line-through; color: #aaa; }
    .del-btn { color: #ccc; text-decoration: none; font-size: 16px; padding: 4px 8px; border-radius: 6px; }
    .del-btn:hover { color: #e44; background: #fee; }
    .empty { text-align: center; padding: 40px; color: #bbb; font-size: 14px; }
    .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
    .footer span { font-size: 13px; color: #888; }
    .footer a { font-size: 13px; color: #aaa; text-decoration: none; }
    .footer a:hover { color: #e44; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 My Tasks</h1>
    <p class="date" id="date"></p>

    <form class="input-row" action="/add" method="POST">
      <input type="text" name="task" placeholder="Add a new task..." autofocus />
      <button type="submit">Add</button>
    </form>

    <div class="filters">
      <a href="/?filter=all" class="{{ 'active' if filter == 'all' }}">All</a>
      <a href="/?filter=active" class="{{ 'active' if filter == 'active' }}">Active</a>
      <a href="/?filter=done" class="{{ 'active' if filter == 'done' }}">Done</a>
    </div>

    <hr />

    <div class="task-list">
      {% if todos %}
        {% for task in todos %}
        <div class="task-card">
          <a href="/toggle/{{ loop.index0 }}" class="check-btn {{ 'checked' if task.done }}">✓</a>
          <span class="task-text {{ 'done' if task.done }}">{{ task.text }}</span>
          <a href="/delete/{{ loop.index0 }}" class="del-btn">✕</a>
        </div>
        {% endfor %}
      {% else %}
        <div class="empty">Nothing here — add a task above! 🎉</div>
      {% endif %}
    </div>

    <div class="footer">
      <span>{{ count }} task{{ 's' if count != 1 }} remaining</span>
      <a href="/clear">Clear completed</a>
    </div>
  </div>

  <script>
    document.getElementById('date').textContent =
      new Date().toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  </script>
</body>
</html>
